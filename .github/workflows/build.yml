name: Build libchams

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK r25c
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Get AML Headers
        uses: actions/checkout@v4
        with:
          repository: AndroidModLoader/AML
          path: aml_sdk

      - name: Copy AML Headers
        run: |
          mkdir -p include/mod
          find aml_sdk -name "amlmod.h" -o -name "iaml.h" -o -name "interface.h" \
            | xargs -I{} cp {} include/mod/
          echo "=== Headers ==="
          ls -1 include/mod/

      - name: Build
        run: |
          $ANDROID_NDK_ROOT/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=./jni/Android.mk \
            NDK_APPLICATION_MK=./jni/Application.mk

      - name: Verify
        run: |
          ls -lh libs/armeabi-v7a/libchams.so
          file libs/armeabi-v7a/libchams.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm \
            -D libs/armeabi-v7a/libchams.so | grep " [TD] "

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libchams-arm32
          path: libs/armeabi-v7a/libchams.so
          retention-days: 7
